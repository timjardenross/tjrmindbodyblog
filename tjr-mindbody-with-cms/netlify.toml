[build]
  publish = "."

# Required for Decap CMS: Git Gateway needs these headers
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "no-cache"

# Clean URL redirects (carry over old GoDaddy URLs too)
[[redirects]]
  from = "/about-me"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/blog"
  to   = "/blog.html"
  status = 200

[[redirects]]
  from = "/tjrs-blog"
  to   = "/blog.html"
  status = 200

[[redirects]]
  from = "/what-is-coaching"
  to   = "/coaching.html"
  status = 200

[[redirects]]
  from = "/lets-chat"
  to   = "/lets-chat.html"
  status = 200

[[redirects]]
  from = "/lets-chat-1"
  to   = "/lets-chat.html"
  status = 200

[[redirects]]
  from = "/book-a-call"
  to   = "/lets-chat.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404
